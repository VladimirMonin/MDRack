[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mdrack-sqlite"
version = "1.0.0rc1"
description = "SQLite catalog and search adapter for mdrack-core"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = ["mdrack-core==1.0.0rc1"]

[tool.hatch.build.targets.wheel]
packages = ["src/mdrack_sqlite"]

[tool.hatch.build.targets.sdist]
include = [
    "/API.md",
    "/CHANGELOG.md",
    "/README.md",
    "/pyproject.toml",
    "/src/mdrack_sqlite",
]
